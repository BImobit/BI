<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .pb-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;  /* corta o excesso (barra inferior) */
      position: relative;
    }

    .pb-frame {
      width: 100%;
      height: calc(100% + 62px); /* deixa o BI maior pra baixo */
      margin-bottom: -62px;      /* empurra pra baixo sem cortar o topo */
      border: none;
    }
  </style>
</head>
<body>

<div class="pb-wrap">
  <!-- Power BI -->
  <iframe
    class="pb-frame"
    src="https://app.powerbi.com/view?r=eyJrIjoiZTA1YWI5N2UtZDU3NC00ZDViLWJkM2EtODkxOThlNTBmMDlhIiwidCI6IjQ2OGE3ZDg3LTM5ZGMtNDk5MC1iN2VjLTFmNjIzNjEwMDI1MiJ9"
    allowfullscreen="true">
  </iframe>
</div>
</body>
</html>
