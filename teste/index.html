<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor Externo - Logo na Tabela</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f4f8ff;color:#0b1f3f}
    .page{max-width:980px;margin:20px auto;padding:12px}
    .panel{background:#fff;border:1px solid #dbe7ff;border-radius:12px;padding:12px}
    .top{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}
    .source{min-height:84px;border:2px dashed #93c5fd;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:8px;flex:1 1 500px}
    .source.over{border-color:#2563eb;background:#eff6ff}
    .toolbar{display:flex;gap:8px;flex:0 0 auto}
    .btn{border:1px solid #2563eb;background:#2563eb;color:#fff;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer}
    .btn.secondary{background:#fff;color:#2563eb}

    .drag-block{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:10px;cursor:grab}
    .drag-block img{width:120px;max-width:100%;height:auto;display:block}
    .drag-block span{font-size:12px;font-weight:700;color:#1e3a8a;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    table{width:100%;border-collapse:collapse;background:#fff}
    th,td{border:1px solid #dbe7ff;padding:9px;font-size:13px;text-align:left}
    th{background:#e7eefb}
    .slot{min-height:60px;border:2px dashed #cbd5e1;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:6px;color:#64748b}
    .slot.over{border-color:#2563eb;background:#dbeafe;color:#1d4ed8}
    .slot.filled{border-style:solid;background:#fff}
    .slot.filled .slot-placeholder{display:none}
    .slot-placeholder{font-size:12px}

    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.45);z-index:9999}
    .modal.show{display:flex}
    .card{width:min(92vw,420px);background:#fff;border-radius:12px;border:1px solid #dbe7ff;box-shadow:0 12px 30px rgba(0,0,0,.2);padding:14px}
    .title{font-size:15px;font-weight:700;margin-bottom:10px}
    .label{display:block;font-size:12px;font-weight:700;color:#334155;margin:8px 0 6px}
    .input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 10px;font-size:13px;outline:none}
    .input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    .actions{margin-top:12px;display:flex;justify-content:flex-end;gap:8px}
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="top">
        <div id="logoSource" class="source">
          <div id="dragBlock" class="drag-block" draggable="true" title="Clique para editar nome e link">
            <img id="dragLogo" draggable="false" src="https://raw.githubusercontent.com/BImobit/BI/refs/heads/main/TI/IMAGENS/logo.png" alt="Logo">
            <span id="logoName">Meu bloco</span>
          </div>
        </div>
        <div class="toolbar">
          <button id="downloadWordBtn" class="btn" type="button">Baixar Word (.doc)</button>
          <button id="downloadHtmlBtn" class="btn secondary" type="button">Baixar HTML</button>
        </div>
      </div>

      <table class="tbl" id="tableMain">
        <thead>
          <tr>
            <th style="width:90px">Linha</th>
            <th>Solte a logo aqui</th>
          </tr>
        </thead>
        <tbody id="tbRows"></tbody>
      </table>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="card">
      <div class="title">Editar bloco da logo</div>
      <label class="label" for="nameInput">Nome</label>
      <input id="nameInput" class="input" type="text" maxlength="60">
      <label class="label" for="urlInput">Link da imagem</label>
      <input id="urlInput" class="input" type="text" maxlength="800">
      <div class="actions">
        <button id="cancelBtn" class="btn secondary" type="button">Cancelar</button>
        <button id="saveBtn" class="btn" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const initialName = params.get('nome') || 'Meu bloco';
      const initialImg = params.get('img') || 'https://raw.githubusercontent.com/BImobit/BI/refs/heads/main/TI/IMAGENS/logo.png';
      const rowsParam = parseInt(params.get('linhas') || '10', 10);
      const rowCount = Number.isFinite(rowsParam) && rowsParam > 0 && rowsParam <= 50 ? rowsParam : 10;

      const dragBlock = document.getElementById('dragBlock');
      const dragLogo = document.getElementById('dragLogo');
      const logoName = document.getElementById('logoName');
      const source = document.getElementById('logoSource');
      const tbRows = document.getElementById('tbRows');
      const modal = document.getElementById('editModal');
      const nameInput = document.getElementById('nameInput');
      const urlInput = document.getElementById('urlInput');
      const saveBtn = document.getElementById('saveBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const downloadWordBtn = document.getElementById('downloadWordBtn');
      const downloadHtmlBtn = document.getElementById('downloadHtmlBtn');
      if(!dragBlock || !dragLogo || !logoName || !source || !tbRows || !modal || !nameInput || !urlInput || !saveBtn || !cancelBtn || !downloadWordBtn || !downloadHtmlBtn) return;

      logoName.textContent = initialName;
      dragLogo.src = initialImg;

      for(let i=1;i<=rowCount;i++){
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>'+i+'</td><td><div class="slot"><span class="slot-placeholder">Linha '+i+'</span></div></td>';
        tbRows.appendChild(tr);
      }

      const slots = document.querySelectorAll('.slot');

      function clearStates(){
        source.classList.remove('over');
        slots.forEach(function(s){ s.classList.remove('over'); });
      }

      function clearOldSlot(){
        const oldSlot = dragBlock.closest('.slot');
        if(oldSlot) oldSlot.classList.remove('filled');
      }

      function openModal(){
        nameInput.value = (logoName.textContent || '').trim();
        urlInput.value = dragLogo.getAttribute('src') || '';
        modal.classList.add('show');
        setTimeout(function(){ nameInput.focus(); nameInput.select(); }, 0);
      }

      function closeModal(){ modal.classList.remove('show'); }

      function getDocHtml(){
        const clone = document.getElementById('tableMain').cloneNode(true);
        clone.querySelectorAll('.slot').forEach(function(slot){ slot.classList.remove('over'); });
        return '<html><head><meta charset="utf-8"><style>' +
          'body{font-family:Arial,sans-serif;padding:16px;}' +
          'h3{margin:0 0 10px;color:#0b1f3f;}' +
          'table{width:100%;border-collapse:collapse;background:#fff;}' +
          'th,td{border:1px solid #dbe7ff;padding:9px;font-size:13px;text-align:left;}' +
          'th{background:#e7eefb;color:#0b1f3f;}' +
          '.slot{min-height:52px;display:flex;align-items:center;justify-content:center;padding:6px;}' +
          '.drag-block{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:10px;}' +
          '.drag-block img{width:100px;height:auto;display:block;}' +
          '.drag-block span{font-size:12px;font-weight:700;color:#1e3a8a;}' +
          '.slot-placeholder{font-size:12px;color:#64748b;}' +
          '</style></head><body><h3>Tabela com imagem</h3>' + clone.outerHTML + '</body></html>';
      }

      function downloadBlob(content, type, filename){
        const blob = new Blob(['\ufeff', content], { type: type });
        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function(){ URL.revokeObjectURL(objUrl); }, 2000);
      }

      function downloadWord(){
        const currentSlot = dragBlock.closest('.slot');
        if(!currentSlot){
          alert('Arraste o bloco da logo para uma linha antes de baixar.');
          return;
        }
        downloadBlob(getDocHtml(), 'application/msword', 'tabela_com_imagem.doc');
      }

      function downloadHtml(){
        const currentSlot = dragBlock.closest('.slot');
        if(!currentSlot){
          alert('Arraste o bloco da logo para uma linha antes de baixar.');
          return;
        }
        downloadBlob(getDocHtml(), 'text/html', 'tabela_com_imagem.html');
      }

      dragBlock.addEventListener('click', function(e){ e.stopPropagation(); openModal(); });
      dragBlock.addEventListener('dragstart', function(e){ e.dataTransfer.setData('text/plain', 'logo-block'); });

      slots.forEach(function(slot){
        slot.addEventListener('dragover', function(e){ e.preventDefault(); clearStates(); slot.classList.add('over'); });
        slot.addEventListener('dragleave', function(){ slot.classList.remove('over'); });
        slot.addEventListener('drop', function(e){
          e.preventDefault();
          if(e.dataTransfer.getData('text/plain') !== 'logo-block') return;
          clearStates();
          clearOldSlot();
          slot.appendChild(dragBlock);
          slot.classList.add('filled');
        });
      });

      source.addEventListener('dragover', function(e){ e.preventDefault(); clearStates(); source.classList.add('over'); });
      source.addEventListener('dragleave', function(){ source.classList.remove('over'); });
      source.addEventListener('drop', function(e){
        e.preventDefault();
        if(e.dataTransfer.getData('text/plain') !== 'logo-block') return;
        clearStates();
        clearOldSlot();
        source.appendChild(dragBlock);
      });

      downloadWordBtn.addEventListener('click', downloadWord);
      downloadHtmlBtn.addEventListener('click', downloadHtml);

      saveBtn.addEventListener('click', function(){
        const nextName = (nameInput.value || '').trim();
        const nextUrl = (urlInput.value || '').trim();
        logoName.textContent = nextName || 'Sem nome';
        if(nextUrl) dragLogo.setAttribute('src', nextUrl);
        closeModal();
      });

      cancelBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });

      function handleKeys(e){
        if(e.key === 'Enter') saveBtn.click();
        if(e.key === 'Escape') closeModal();
      }
      nameInput.addEventListener('keydown', handleKeys);
      urlInput.addEventListener('keydown', handleKeys);
    })();
  </script>
</body>
</html>
